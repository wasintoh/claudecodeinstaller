name: Build GUI Installer

# Builds the Tauri v2 GUI installer (.exe / .msi) on a Windows runner.
# Triggered on:
#   - push to main (uploads artifacts for download)
#   - tag v* (creates a GitHub Release with the .exe attached)
#   - manual dispatch

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.platform }}
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest]

    defaults:
      run:
        working-directory: claude-installer-gui

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: claude-installer-gui/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: claude-installer-gui/src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        run: npm run tauri build

      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: claude-code-installer-nsis
          path: |
            claude-installer-gui/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn
          retention-days: 30

      - name: Upload MSI installer
        uses: actions/upload-artifact@v4
        with:
          name: claude-code-installer-msi
          path: |
            claude-installer-gui/src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: warn
          retention-days: 30

      - name: Create Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            claude-installer-gui/src-tauri/target/release/bundle/nsis/*.exe
            claude-installer-gui/src-tauri/target/release/bundle/msi/*.msi
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
